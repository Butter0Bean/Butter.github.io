<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TaskMaster — Умный список задач</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TaskMaster">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Умный менеджер задач с напоминаниями и дедлайнами">
</head>
<body>
    <div class="bg-gradient"></div>
    
    <div class="container">
        <!-- Шапка -->
        <div class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">🎯</div>
                    <h1>TaskMaster</h1>
                </div>
                <p class="subtitle">Организуй свои задачи с удовольствием</p>
            </div>
        </div>

        <!-- Уведомления -->
        <div class="notification-card">
            <div class="notification-info">
                <span class="bell-icon">🔔</span>
                <span class="notification-text">Будь в курсе дел</span>
            </div>
            <button id="notificationBtn" class="btn-notification">
                <span class="btn-icon">🔔</span>
                Включить уведомления
            </button>
        </div>
        <div id="notificationStatus" class="status-message"></div>

        <!-- Форма добавления задачи с дедлайном -->
        <div class="add-task-card">
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="Напиши свою задачу..." autocomplete="off">
                <div class="datetime-group">
                    <input type="datetime-local" id="taskDeadline" class="datetime-input">
                    <button id="addBtn" class="btn-add">
                        <span>+</span> Добавить
                    </button>
                </div>
            </div>
            <div class="deadline-hint">⏰ Укажите дедлайн (если нужно)</div>
        </div>

        <!-- Фильтры -->
        <div class="filters">
            <button class="filter-btn active" data-filter="all">
                <span>📋</span> Все
            </button>
            <button class="filter-btn" data-filter="active">
                <span>🔄</span> Активные
            </button>
            <button class="filter-btn" data-filter="completed">
                <span>✅</span> Выполненные
            </button>
            <button class="filter-btn" data-filter="overdue">
                <span>⚠️</span> Просроченные
            </button>
        </div>

        <!-- Список задач -->
        <div class="tasks-wrapper">
            <ul id="taskList" class="task-list"></ul>
        </div>

        <!-- Статистика -->
        <div class="stats-card">
            <div class="stats-info">
                <div class="stats-details">
                    <span id="taskCount" class="stats-count">0 задач</span>
                    <span id="overdueCount" class="overdue-badge">0 просрочено</span>
                </div>
                <button id="clearCompleted" class="btn-clear">
                    🗑️ Очистить выполненные
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    
    <script>
    // Дополнительная проверка Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => {
                    console.log('Service Worker зарегистрирован:', reg);
                })
                .catch(err => {
                    console.log('Ошибка регистрации:', err);
                });
        });
    }
    </script>
</body>
</html>
