<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои задачи</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 Список задач</h1>
        
        <div class="notification-bar">
            <button id="notificationBtn" class="notification-btn">
                🔔 Включить уведомления
            </button>
            <span id="notificationStatus" class="notification-status"></span>
        </div>
        
        <div class="add-task">
            <input type="text" id="taskInput" placeholder="Добавить новую задачу...">
            <button id="addBtn">➕ Добавить</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="active">Активные</button>
            <button class="filter-btn" data-filter="completed">Выполненные</button>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <div class="task-stats">
            <span id="taskCount">0 задач</span>
            <button id="clearCompleted">Очистить выполненные</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
